<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modern Animated Demo</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      scroll-behavior: smooth;
    }

    nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 60px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
    }

    nav h2 { color: #00c6ff; }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      opacity: 0.7;
    }

    nav a:hover { opacity: 1; }

    .hero {
      height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      background: radial-gradient(circle at top, #1e3a8a, #0f172a);
    }

    .hero h1 {
      font-size: 50px;
    }

    .hero span { color: #00c6ff; }

    .hero p {
      max-width: 600px;
      opacity: 0.8;
      margin: 15px 0;
    }

    .btn {
      padding: 12px 25px;
      border-radius: 30px;
      border: none;
      background: #00c6ff;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      transform: scale(1.05);
    }

    .section {
      padding: 80px 60px;
      text-align: center;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .card {
      width: 250px;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.05);
      transition: 0.5s;
      opacity: 0;
      transform: translateY(40px);
    }

    .card.show {
      opacity: 1;
      transform: translateY(0);
    }

    .card:hover {
      background: rgba(0,198,255,0.15);
      transform: translateY(-10px);
    }

    footer {
      text-align: center;
      padding: 20px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<nav>
  <h2>MySite</h2>
  <div>
    <a href="#">Home</a>
    <a href="#features">Features</a>
    <a href="#">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1>Build <span>Modern</span> Websites</h1>
  <p>Now your demo page looks like a real startup landing page with smooth animations.</p>
  <button class="btn" onclick="alert('Welcome 🚀')">Get Started</button>
</section>

<section class="section" id="features">
  <h2>Features</h2>

  <div class="cards">
    <div class="card">⚡ Fast Performance</div>
    <div class="card">🎨 Clean UI Design</div>
    <div class="card">🚀 Deployment Ready</div>
  </div>
</section>

<footer>
  Built with HTML + CSS + JS
</footer>

<script>
  // Scroll animation
  const cards = document.querySelectorAll('.card');

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('show');
      }
    });
  });

  cards.forEach(card => observer.observe(card));
</script>

</body>
</html>
